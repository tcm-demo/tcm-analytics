<script>
const MD = "# 打印计划模块 产品需求文档（PRD）\n\n| 项 | 内容 |\n| --- | --- |\n| 文档版本 | v1.4 |\n| 创建日期 | 2026-07-17 |\n| 模块 | 打印计划（print-plan） |\n| 状态 | 已实现（MVP，即 Minimum Viable Product 最小可行产品） |\n| 读者 | 产品、前端、后端、测试、门店运营 |\n| 接口规范来源 | 参照现有 `/mnmart` 接口体系（YApi 导出 `yapi.taocaimall.com/data.json`） |\n\n---\n\n## 0. 版本更新记录\n\n| 版本 | 日期 | 更新摘要 |\n| --- | --- | --- |\n| v1.4 | 2026-07-20 | 精确化 §5.3 第二层「已打印项价格变动」处理：明确状态重置取决于**目标计划类型与状态**——价格相同则任何信息都不动（含打印状态，规则1）；价格不同则仅当目标计划为「调价自动（`type=1`，无论是否完成）」或「用户新增（`type=0`）且计划未完成（按计划 `status`，非商品打印状态）」时才更新信息并重置为待打印；用户新增且已完成的计划即便价格不同也保持原状。消解原 §12 待确认项。 |\n| v1.3 | 2026-07-20 | 调价归集逻辑升级为「三层决策树」（§4.6 / §5.3 / §9.9 / §9.10）：明确「调价自动计划」优先（规则4）、当天未完成计划次之（规则2）、否则新建「调价自动」计划（规则3）；补充调价行为定义（规则5：销售改价 / 商品编辑等**永久性价格调整**均入计划）与打印进度计数规则（规则6：已打印数 / 总商品数，状态翻转 ±1）；明确价格比对与状态重置细则（规则1 / 2 / 4：未打印商品随调价同步更新价格，已打印项价格未变则不更新、价格变动则重置为待打印）。 |\n| v1.2 | 2026-07-17 | 初版（MVP）：计划列表 / 详情 / 添加 / 打印、调价自动入计划、改价日志一键加入，含数据结构与接口契约。 |\n\n---\n\n## 1. 背景与目标\n\n价签打印是门店日常高频操作。当前改价、上新、补货均需重新打印价签，但缺乏\"批量组织 + 按计划打印\"的能力，操作员常逐张打印、易漏打、易与旧价签混淆（货签价不符存在合规风险）。\n\n**目标**：提供\"打印计划\"管理能力，支持把待打印商品按门店/类型组织成计划，统一预览价签并批量打印；调价场景自动归集到当天计划，确保价签及时、准确更新。\n\n---\n\n## 2. 用户与场景\n\n| 角色 | 职责 |\n| --- | --- |\n| 店长 / 运营 | 创建打印计划、查看计划状态、安排打印、核对价签准确性 |\n| 收银 / 理货员 | 按计划加入/移除商品、设置打印份数、执行打印 |\n\n**典型场景**\n1. 每日巡检发现需换签 → 手动新建计划，加入商品，批量打印。\n2. 后台改价（服务端事件）→ 商品由服务端**自动**归集进入当天\"调价\"计划，计划内比对价格，旧已打印价签自动重置为待打印。**用户无操作**。\n3. 用户在「改价日志」页主动查询当日改价记录 → 勾选若干商品 → 一键加入打印计划（可加入当天最新调价计划或新建）。**用户主动操作**。\n\n---\n\n## 3. 功能概览\n\n| 功能 | 说明 | 主要接口 |\n| --- | --- | --- |\n| 计划列表 | 查看全部打印计划，支持按门店、类型、状态、时间筛选与关键字搜索 | `POST /mnmart/printPlan/list`（新增，§9.2） |\n| 新建计划 | 弹窗选择门店、类型，创建空计划 | `POST /mnmart/printPlan/add`（新增，§9.3） |\n| 计划详情 | 查看/编辑计划内商品，管理打印份数、移除、全选、打印 | `POST /mnmart/printPlan/detail`（新增，§9.4） |\n| 添加商品 | 从商品库按分类/关键字筛选**展示**，勾选**加入计划** | 展示复用 `POST /mnmart/goods/list`（§8）；加入提交 `POST /mnmart/printPlan/addGoods`（新增，§9.6） |\n| 价签打印 | 客户端本地渲染并打印价签，完成后通知服务端记录 | 记录通知 `POST /mnmart/printPlan/print`（§9.8） |\n| 调价自动入计划 | 服务端在改价完成时**自动**归集到当天最新调价计划（用户无操作，见 §4.6） | `POST /mnmart/printPlan/autoAddFromPriceChange`（新增，仅服务端，§9.9） |\n| 改价日志一键加入 | ⚠️ **已取消（v1.4）**：改价日志页仅保留「打印价签」原打印功能，不再提供加入打印计划入口；调价归集走 §4.6 服务端自动 / 规则5 引擎（§5.5） | 历史接口 `POST /mnmart/printPlan/addFromPriceChanges`（§9.10，已取消） |\n\n---\n\n## 4. 详细功能需求\n\n### 4.1 计划列表\n\n**前置条件**：进入「打印计划」页面。\n**交互流程**：\n1. 页面加载即拉取计划列表（接口 `POST /mnmart/printPlan/list`，见 §9.2）。\n2. 筛选栏（左→右）：\n   - **门店 Picker**：单选，默认\"全部门店\"，复用企业&门店下拉 `POST /mnmart/dropdown`（§8）。\n   - **类型 Segment**：全部 / 手动创建 / 调价自动（对应 `type` 0/1）。\n   - **状态 Segment**：全部 / 待打印 / 部分打印 / 已完成（对应 `status` 0/1/2）。\n   - **时间 Segment**：全部 / 今天 / 本周 / 本月（对应 `startTime`/`endTime` 按当前日期计算后传给 `POST /mnmart/printPlan/list`，见 §9.2），默认\"全部\"。\n   - **关键字搜索**：按 `planName` 模糊匹配。\n   - 最右侧 **「产品需求说明」** 入口按钮（非正式功能占位）。\n3. 列表列：序号、计划名称、门店（`shopName`）、类型、商品数、待打印、已打印、状态（标签）、创建时间、操作（查看 / 删除）。\n4. 点击「查看」→ 打开计划详情（§4.3）；点击「删除」→ 二次确认后调用 `POST /mnmart/printPlan/delete`（§9.5）。**仅「待打印」状态的计划允许删除**；「部分打印」「已完成」计划的操作列不显示删除按钮（或置灰禁用），前端按 `status===0` 控制。\n\n**状态标签配色**：待打印（橙 `#fa8c16`）、部分打印（蓝 `#005cf5`）、已完成（绿 `#52c41a`）。\n\n### 4.2 新建计划\n\n**前置条件**：点击「新建计划」或某商品触发自动建计划。\n**交互流程**：\n1. 弹窗字段：门店（`shopId`，预选当前筛选门店）、类型（`type` 0-手动 / 1-调价）。\n2. 校验：`shopId` 必选；计划名称 `planName` 按\"门店 + 类型 + 日期\"自动生成（如 `崧泽大道中心店-调价-0701`），也可由前端传入。\n3. 提交 `POST /mnmart/printPlan/add`（§9.3），创建后进入空计划详情，提示「点击「添加商品」」。\n\n### 4.3 计划详情（核心）\n\n**信息栏**：门店（`shopName`）、类型、商品数、待打印、创建时间（`createdAt`）。\n**备注条**：说明生产日期取值规则（FIFO，见 §5.1）。\n\n**商品表格列（顺序与固定宽度）**：\n\n| 列 | 宽度 | 对齐 | 说明 |\n| --- | --- | --- | --- |\n| 复选框 | 40 | 居中 | 用于「打印选中」收集 |\n| 序号 | 50 | 居中 | 行号 |\n| 商品名称 | 220 | 左 | 超长省略号截断（字段 `goodsName`） |\n| 编码 | 150 | 左 | 商品编码（`goodsCode`） |\n| 规格 | 120 | 左 | 规格（如 500g/袋，`goodsSpec`） |\n| 价格 | 118 | 居中 | 当前售价 `¥x.xx/单位`（`goodsPrice`） |\n| 原价 | 112 | 居中 | 普通文本显示（**不划线**） `¥x.xx`（`goodsListPrice`） |\n| 生产日期 | 130 | 左 | FIFO 取最早批次（`productionDate`）；多批次标角标（如\"3批\"，取自 `batchNo` 批次数） |\n| 状态 | 100 | 居中 | 待打印 / 已打印 标签 |\n| 打印份数 | 110 | 居中 | 未打印可 ±（下限1）；已打印显示份数不可改（`printQty`） |\n| 操作 | 100 | 居中 | 未打印：`+份` `-份` `移除`；已打印：无操作 |\n\n> 表头对齐方式与数据列严格一致，避免视觉偏移。表格 `min-width:1260px`，窄屏横向滚动。\n\n**按钮栏**：`+ 添加商品`、`全选未打印`（仅勾未打印项）、`移除未打印`（移除所有未打印项）。\n**Footer**：`取消`、`打印选中`（提交 `POST /mnmart/printPlan/print`，§9.8，已打印项亦可勾选二次打印）。\n\n**实时同步**：加入/删除/修改份数/打印后，底层计划列表的状态、待打印数、已打印数立即重算刷新（前端按 §9.4/`§9.2` 重新拉取或本地重算）。\n\n### 4.4 添加商品\n\n**前置条件**：在计划详情点击「+ 添加商品」。\n**窗口规范**：宽度 `760px`，列表区固定高度 `380px`（切换分类不抖动），表格 `width:100%` 铺满。\n\n**筛选**：分类下拉（全部分类 + 动态分类，来源 `POST /mnmart/class/display/list` 或商品 `displayClassId`）、关键字搜索（名称/编码，调用 `POST /mnmart/goods/list` 的 `keyword`）。\n**数据来源**：复用 `POST /mnmart/goods/list`（§8），入参 `data.keyword`/`data.shopId`/`data.companyId`/`data.displayClassId` + `requestPage`，返回商品列表（`goodsId`/`goodsName`/`goodsCode`/`goodsSpec`/`goodsUnitName`/`goodsListPrice`/`goodsPrice`/`vipPrice` 等）。\n\n**表格列**：复选框(40) · 商品名称(240, 省略) · 编码(130) · 规格(96) · 价格(110) · 状态(100, 已存在计划则显\"已添加\"且禁用勾选)。\n\n**交互流程**：\n1. 勾选商品 → 点「确定加入」→ 提交 `POST /mnmart/printPlan/addGoods`（§9.6），状态重算。\n2. 已存在于计划的商品禁用勾选并标记「已添加」，避免重复。\n3. 分类切换仅过滤列表，不改变窗口高度。\n\n### 4.5 价签打印\n\n**架构说明**：打印为**客户端行为**——客户端直接基于计划项字段本地渲染价签并完成物理打印输出；服务端**不执行打印**，仅接收客户端上报的打印动作并持久化记录。价签打印与称重打码（`code/printCode` 系列）是**不同功能**，本模块不依赖称重打码接口。\n\n**交互流程**：\n1. 详情点「打印选中」→ 客户端弹出价签预览：可选价签模板（标准价签 / 促销价签等），直接使用计划项字段（商品名称、价格、原价、会员价、条码、规格、生产日期等）在客户端渲染价签。\n2. 客户端本地执行物理打印（如浏览器 `window.print()` 或客户端打印通道），按每项 `printQty` 循环生成对应张数。\n3. 打印完成后，客户端调用 `POST /mnmart/printPlan/print`（§9.8）**通知服务端记录**本次打印（打印项、份数、模板、时间、操作人）。服务端仅落盘打印记录，**不执行打印**。\n4. **已打印商品**可手动勾选进行二次打印（旧价签作废场景），打印后同样上报记录。\n\n**打印份数**：每项按 `printQty` 循环打印；上报记录成功后该项 `printed=true`、`printedAt=当前时间`。\n\n> 价签打印为纯客户端渲染 + 输出，所需字段均来自计划项（§6.5 `PlanItem`），无需服务端打码接口；服务端仅通过 `printPlan/print` 记录打印动作。\n\n### 4.6 调价自动入计划（服务端驱动，用户无操作）\n\n**定位**：本能力由**服务端**完成，前端**无入口、用户无感知**。与 §4.7「改价日志一键加入」（v1.4 已取消）原是两类独立能力，勿混淆；现调价归集仅由本能力（服务端自动）与规则5 引擎（§5.5）承担。\n\n**触发方**：后台改价、总部调价下发等商品价格变更事件**完成**时，由服务端自动执行归集。\n\n**交互流程（服务端）**：\n1. 服务端接收到商品改价事件（携带 `shopId`/`companyId`/最新 `goodsPrice`/`goodsListPrice`/`vipPrice`）。\n2. 调用内部归集接口 `POST /mnmart/printPlan/autoAddFromPriceChange`（§9.9，仅服务端调用，前端不可见）。\n3. 执行 §5.3 调价归集逻辑（三层决策树）：按「当天调价自动计划 → 当天未完成计划 → 新建调价自动计划」选定目标计划，再对商品做价格比对（同价不重复、异价更新并视情况重置已打印）。\n4. 前端仅在「打印计划」列表/详情中**被动看到**结果（计划出现或商品更新）。\n\n**说明**：当前 MVP（最小可行产品）为纯前端 Mock，无真实服务端，故该能力未实际触发；对接后端后由后端实现。\n\n### 4.7 改价日志一键加入（用户主动） ~~已取消（v1.4）~~\n\n> ⚠️ **该能力已在 v1.4 取消**：改价日志页不再提供「加入打印计划」按钮，仅保留「打印价签」原打印功能。调价归集统一由服务端自动归集（§4.6 / §9.9）或规则5 引擎 `ppAddPriceChangeProducts`（§5.3 / §5.5）完成。下方为历史设计，保留备查。\n\n**定位**：用户在「改价日志」页**主动查询、勾选、添加**打印计划，是用户侧操作，与服务端自动归集（§4.6）相互独立。\n\n**前置条件**：进入「改价日志」页（独立页面），可按门店、日期筛选当日改价记录。\n\n**数据来源**：复用 `POST /mnmart/goods/listGoodsPriceRecord`（§8），入参 `data.companyId`/`data.shopId`/`data.startTime`/`data.endTime`/`data.keyword` + `requestPage`，返回改价记录（`goodsId`/`goodsName`/`goodsCode`/`goodsSpec`/`goodsUnitName`/`goodsListPrice` 原价/`goodsPrice` 改前价/`goodsAfterPrice` 改后价/`operator`/`recordTime`）。\n\n**交互流程**：\n1. 用户在改价日志页勾选若干改价记录（默认带出 `goodsAfterPrice` 新价格）。\n2. 点击「加入打印计划」→ 弹出计划选择器：\n   - **加入当天最新调价计划**：无则自动新建（类型 `price-change`）。\n   - **指定已有计划**：从下拉选择某一计划。\n   - **新建调价计划**：新建当天调价计划。\n3. 提交 → 调用 `POST /mnmart/printPlan/addFromPriceChanges`（§9.10）。\n4. 执行 §5.3 归集与价格比对逻辑（同商品比对价格，不同则更新并重置已打印）。\n5. 返回结果（新增/更新/重置数），前端提示并刷新「打印计划」列表。\n\n---\n\n## 5. 业务规则\n\n### 5.1 生产日期（FIFO）\n- 商品存在多批次时，价签生产日期取**最早批次**（最临近过期）。\n- 多批次共存时，详情表格生产日期旁标注批次数（如「3批」），hover 提示规则。\n- 批次数据来源：复用 `POST /mnmart/inventory/batchListByGoodsIdCode`（§8），按 `goodsCode` 或 `goodsIds` 查询，返回 `productionDate`/`batchNo`/`expirationDate`/`shelfLifeType`/`shelfLife`，FIFO 取 `productionDate` 最小者，批次数 = 返回记录数。\n\n### 5.2 计划状态\n```\n空计划(无商品) ──► 待打印(0)\n存在未打印商品 ──► 部分打印(1)\n全部商品已打印 ──► 已完成(2)\n```\n- 计划无商品 → **待打印(0)**\n- 存在未打印商品 → **部分打印(1)**\n- 全部商品已打印 → **已完成(2)**\n\n### 5.3 调价归集逻辑（三层决策树，两端共用）\n> 本逻辑为「调价归集」的**共用业务规则**，被两类触发方复用：\n> - **A. 服务端自动入计划**（§4.6）：后端改价事件自动调用 `autoAddFromPriceChange`，或销售改价 / 商品编辑等永久调价行为触发（§5.5）。\n> - **B. 调价归集引擎（规则5 统一入口）**：由 `ppAddPriceChangeProducts(products)`（index.html）提供，供销售改价 / 商品编辑等永久调价行为调用（§5.5）。原「改价日志页一键加入」入口已在 v1.4 取消（详见 §4.7 / §9.10 标注）。\n> 触发方不同，但归集、价格比对与状态重置规则一致。字段以现有商品体系为准：`goodsPrice`(售价) / `goodsListPrice`(原价) / `vipPrice`(会员价)。\n\n**第一层：选定目标计划（按优先级）**\n1. **P1（规则4）** 当天已存在「调价自动」计划（`type=1`，无论待打印 / 部分打印 / 已完成）→ 直接作为目标计划。\n2. **P2（规则2）** 否则，当天存在**未完成**计划（`status≠2`，即待打印 / 部分打印）→ 以该未完成计划为目标。\n3. **P3（规则3）** 否则（当天仅有已完成计划，或当天无任何计划）→ **新建**「调价自动」计划（`type=1`），作为目标。\n\n> 说明：P1 优先于 P2 / P3，确保「调价自动计划」是调价商品的统一归集入口；仅当当天无调价自动计划时，才退而用未完成计划或新建。\n\n**第二层：商品加入 / 更新（目标计划内）**\n  - 计划中无同条码商品 → **新增**（待打印，写入最新价）。\n  - 计划中有同条码商品，且价格（售价 / 原价 / 会员价）**完全相同** → 不重复加入、不修改**任何信息（含打印状态）**（对应规则1：价格没变则不更新、不重置）。\n  - 计划中有同条码商品，且价格**不同** → 是否更新取决于**目标计划类型与状态**（二者共同前提均为「价格变更且与计划中价格不同」）：\n    - 目标计划为「调价自动」（`type=1`，**无论是否完成**）→ 更新商品信息（最新价）并重置为**待打印**（旧价签作废，需重打）。\n    - 目标计划为「用户新增」（`type=0`）且**计划未完成**（`status≠2`，**以计划状态为准，非商品状态**）→ 更新商品信息并重置为**待打印**。\n    - 目标计划为「用户新增」且**计划已完成**（`status=2`）→ 即便价格不同，也**不更新信息、不重置打印状态**。\n\n> 说明：规则1「已打印数据不进行更新」与规则2 / 4「已打印项更新价格并标记待打印」的张力，已由本规则消解——**价格相同则任何信息都不动（规则1）；价格不同则仅当目标计划为「调价自动」或「用户新增且未完成」时才更新信息并重置待打印（规则2 / 4），用户新增且已完成的计划即便价格不同也保持原状**。该判定以「防止打印过期价格」为总目标，且以计划状态（而非商品打印状态）作为用户新增计划的判定依据。\n\n### 5.4 打印份数\n- 每项默认 1 份；未打印项可调增减（下限 1）；已打印项显示份数、不可调。\n- 打印时按 `printQty` 循环生成价签。\n\n### 5.5 调价行为定义（规则5）\n所有**永久性价格调整**行为，均视为调价行为，相关商品须归集进入打印计划（经 §5.3 三层决策树），以确保价签与最新售价一致：\n- 后台改价 / 总部调价下发（服务端事件，§4.6）。\n- **销售改价**：前台销售环节发生的价格变更。\n- **商品编辑**：商品主数据维护中修改了 `goodsPrice` / `goodsListPrice` / `vipPrice`。\n- 其他导致商品售价永久变化的操作（以产品定义为准）。\n\n> 判定标准：是否**写回商品主数据售价**。仅当价格变更持久化到商品主数据时才计入；临时挂牌、未落库的价格试算不在此列。\n\n### 5.6 打印进度计数（规则6）\n- 计划打印进度 = **已打印商品数 / 总商品数**（与 §5.2 状态联动：`pendingCount = totalCount - printedCount`）。\n- 商品状态翻转时计数同步变化：\n  - 待打印 → 已打印：该计划 `printedCount +1`（进度 +1）。\n  - 已打印 → 待打印（如 §5.3 价格变动重置）：`printedCount -1`（进度 -1）。\n- 计数由打印 / 重置动作触发即时重算，不依赖异步对账。\n\n---\n\n## 6. 数据结构\n\n> 字段命名**对齐现有 `/mnmart` 体系**（小驼峰）。凡现有接口已定义的字段（商品 `goods*`、门店 `shop*`、批次 `batchNo/productionDate` 等）一律沿用，不重新发明。\n\n### 6.1 实体关系\n```\nShop(门店) 1─* PrintPlan(打印计划) 1─* PlanItem(计划项)\nGoods(商品主数据,mart体系) 1─* Batch(批次,复用库存批次)\nTemplate(价签模板,前端渲染概念) 1─* PlanItem(打印时引用)\n```\n\n### 6.2 门店 `Shop`（复用现有）\n| 字段 | 类型 | 说明 | 来源 |\n| --- | --- | --- | --- |\n| `shopId` | string | 门店 ID | `POST /mnmart/shop/list` |\n| `shopName` | string | 门店名称 | 同上 |\n| `companyId` | string | 所属企业 ID | 同上 |\n| `status` | int | 门店状态 0-启用 1-禁用 2-生效中 3-已过期 | 同上 |\n\n### 6.3 商品主数据 `Goods`（复用现有 `POST /mnmart/goods/list`）\n\n| 字段 | 类型 | 必填 | 说明 |\n| --- | --- | --- | --- |\n| `goodsId` | string | 是 | 商品 ID（唯一键，打码/计划关联用） |\n| `goodsName` | string | 是 | 商品名称 |\n| `goodsCode` | string | 是 | 商品编码（价签条码展示用） |\n| `goodsSpec` | string | 是 | 规格，如 `500g/袋` |\n| `goodsUnitId` | string | 否 | 单位 ID |\n| `goodsUnitName` | string | 否 | 计价单位名，如 `kg`/`份` |\n| `goodsListPrice` | decimal | 否 | 原价/吊牌价（价签\"原价\"列） |\n| `goodsPrice` | decimal | 是 | 当前售价 |\n| `vipPrice` | decimal | 否 | 会员价 |\n| `type` | int | 否 | 商品类型 0-非标品 1-标品 |\n| `enable` | int | 否 | 上下架 0-上架 1-下架 |\n| `status` | int | 否 | 状态 0-启用 1-禁用 |\n| `saleType` | int | 否 | 销售类型 0-非售品 1-售品 |\n| `imgUrl` | string | 否 | 图片 URL |\n| `shelfLifeType` | int | 否 | 保质期类型 1-天 2-月 3-年 |\n| `shelfLife` | int | 否 | 保质期 |\n| `storageMethod` | string | 否 | 贮藏方式 |\n| `purchasePrice` | decimal | 否 | 最新进货价 |\n| `goodsBrand` | string | 否 | 品牌 |\n| `displayClassId` | string | 否 | 显示分类 ID（添加商品筛选用） |\n\n### 6.4 批次 `Batch`（复用现有 `POST /mnmart/inventory/batchListByGoodsIdCode`）\n\n| 字段 | 类型 | 说明 |\n| --- | --- | --- |\n| `batchInventoryId` | string | 批次库存 ID |\n| `goodsId` | string | 商品 ID |\n| `goodsCode` | string | 商品编码 |\n| `batchNo` | string | 批次号 |\n| `productionDate` | string | 生产日期 `yyyy-MM-dd` |\n| `expirationDate` | string | 过期日期 `yyyy-MM-dd` |\n| `shelfLifeType` | int | 保质期类型 |\n| `shelfLife` | int | 保质期 |\n| `inventory` | decimal | 批次库存数量 |\n| `purchasePrice` | decimal | 进货单价 |\n\n### 6.5 打印计划 `PrintPlan`（新增，数组 `PRINT_PLANS`）\n\n| 字段 | 类型 | 必填 | 说明 |\n| --- | --- | --- | --- |\n| `printPlanId` | string | 是 | 计划唯一 ID（uuid） |\n| `planName` | string | 是 | 计划名称（自动生成或传入） |\n| `shopId` | string | 是 | 门店 ID（关联 §6.2） |\n| `shopName` | string | 是 | 门店名称（快照） |\n| `companyId` | string | 是 | 所属企业 ID |\n| `type` | int | 是 | `0` 手动创建 / `1` 调价自动 |\n| `status` | int | 是 | `0` 待打印 / `1` 部分打印 / `2` 已完成 |\n| `totalCount` | int | 是 | 商品总数 |\n| `pendingCount` | int | 是 | 待打印数 |\n| `printedCount` | int | 是 | 已打印数 |\n| `createdAt` | string | 是 | 创建时间 `yyyy-MM-dd HH:mm:ss` |\n| `items` | PlanItem[] | 是 | 计划内商品项 |\n\n### 6.6 计划项 `PlanItem`（新增）\n\n| 字段 | 类型 | 必填 | 说明 |\n| --- | --- | --- | --- |\n| `itemId` | string | 是 | 项 ID |\n| `goodsId` | string | 是 | 商品 ID（关联 Goods） |\n| `goodsName` | string | 是 | 商品名称（快照，加入时固化） |\n| `goodsCode` | string | 是 | 商品编码（快照，价签条码） |\n| `goodsSpec` | string | 是 | 规格（快照） |\n| `goodsUnitName` | string | 否 | 单位名（快照） |\n| `goodsPrice` | decimal | 是 | 售价（快照，调价时更新） |\n| `goodsListPrice` | decimal | 否 | 原价（快照，详情表普通显示不划线） |\n| `vipPrice` | decimal | 否 | 会员价（快照） |\n| `productionDate` | string | 否 | 生产日期（FIFO 取值，多批次时动态计算） |\n| `batchCount` | int | 否 | 批次数量（多批次角标，取自 §6.4 批次数） |\n| `printQty` | int | 是 | 打印份数，默认 1，下限 1 |\n| `printed` | boolean | 是 | 是否已打印 |\n| `printedAt` | string\\|null | 否 | 最近打印时间 `yyyy-MM-dd HH:mm`，无则 null |\n| `source` | int | 否 | `0` 手动添加 / `1` 调价自动加入 |\n\n### 6.7 价签模板 `Template`（前端渲染概念）\n> 模板选择为前端价签渲染概念；价签由客户端直接基于计划项字段渲染并输出到打印机（与称重打码 `code/printCode` 无关），模板决定展示元素（`goodsPrice`/`goodsListPrice`/`vipPrice`/`goodsCode`/`goodsName`/`goodsSpec`）。服务端不参与打印执行。\n\n| 字段 | 类型 | 说明 |\n| --- | --- | --- |\n| `templateId` | string | 模板 ID，如 `tpl-01` 标准价签 |\n| `templateName` | string | 模板名称 |\n| `elements` | string[] | 包含元素：`goodsPrice` `goodsListPrice` `vipPrice` `goodsCode` `goodsName` `goodsSpec` |\n\n### 6.8 完整 JSON 示例（PrintPlan 视角）\n\n```json\n{\n  \"printPlanId\": \"pl_20260701_a1b2\",\n  \"planName\": \"崧泽大道中心店-调价-0701\",\n  \"shopId\": \"1810933789769904128\",\n  \"shopName\": \"崧泽大道中心店\",\n  \"companyId\": \"1810928032239439872\",\n  \"type\": 1,\n  \"status\": 1,\n  \"totalCount\": 2,\n  \"pendingCount\": 1,\n  \"printedCount\": 1,\n  \"createdAt\": \"2026-07-01 09:12:33\",\n  \"items\": [\n    {\n      \"itemId\": \"it_001\",\n      \"goodsId\": \"1824610137569304576\",\n      \"goodsName\": \"有机小白菜\",\n      \"goodsCode\": \"VEG-001\",\n      \"goodsSpec\": \"500g/袋\",\n      \"goodsUnitName\": \"袋\",\n      \"goodsPrice\": 3.99,\n      \"goodsListPrice\": 5.50,\n      \"vipPrice\": 3.59,\n      \"productionDate\": \"2026-06-28\",\n      \"batchCount\": 1,\n      \"printQty\": 1,\n      \"printed\": false,\n      \"printedAt\": null,\n      \"source\": 1\n    },\n    {\n      \"itemId\": \"it_002\",\n      \"goodsId\": \"1824610137569304577\",\n      \"goodsName\": \"土鸡蛋\",\n      \"goodsCode\": \"EGG-002\",\n      \"goodsSpec\": \"30枚/盒\",\n      \"goodsUnitName\": \"盒\",\n      \"goodsPrice\": 29.90,\n      \"goodsListPrice\": 35.00,\n      \"vipPrice\": 27.90,\n      \"productionDate\": \"2026-06-25\",\n      \"batchCount\": 1,\n      \"printQty\": 2,\n      \"printed\": true,\n      \"printedAt\": \"2026-07-01 10:05:12\",\n      \"source\": 0\n    }\n  ]\n}\n```\n\n> 说明：商品主数据（含多批次 `productionDate`）来自 `POST /mnmart/goods/list` 与 `POST /mnmart/inventory/batchListByGoodsIdCode`；本示例省略 Goods/Batch 原文，以其现有返回为准。\n\n### 6.9 演示态本地缓存（临时占位，非产品方案）\n> 说明：当前前端 MVP（最小可行产品）仅为**演示目的**，使用浏览器 `localStorage`（`tcm_print_plans_v1`）暂存数据，便于本地预览，**不代表产品真实持久化方案**。\n> **正式方案**：数据持久化由服务端数据库负责（见 §9 接口契约），前端不落盘、以接口读写为准，确保多端一致与审计可追溯。\n\n---\n\n## 7. 接口通用规范（统一约定）\n\n> 本章节为**全模块统一约定**，所有接口（含复用与新增）均遵守。规范取自现有 `/mnmart` 接口体系。\n\n- **基础路径**：`/mnmart`。\n- **协议 / 编码**：HTTPS，`Content-Type: application/json`，字符 UTF-8。\n- **请求方法**：**统一 `POST`**（列表、查询、详情、写操作均用 POST，与现有体系一致）。\n- **鉴权**：`POST /mnmart/user/login` 登录后返回 `jwtToken`；后续请求在 Header 携带 `Authorization: Bearer {jwtToken}`（与现有 `/mnmart` 接口鉴权一致；具体 header 名以网关为准，统一走 JWT）。\n- **请求包体（统一）**：\n  ```json\n  {\n    \"data\": { \"...业务参数...\" },\n    \"requestPage\": { \"currentPage\": 1, \"pageSize\": 10 }\n  }\n  ```\n  - 列表/分页接口带 `requestPage`；单条查询/写操作可省略 `requestPage`。\n  - 通用上下文：几乎所有接口需携带 `companyId`、`shopId`（租户 + 门店隔离）；`shopId` 缺省表示跨门店/总部视角。\n- **响应包体（统一）**：\n  ```json\n  {\n    \"code\": 0,\n    \"message\": \"success\",\n    \"data\": [ \"...或对象...\" ],\n    \"pageInfo\": { \"pageSize\": 10, \"currentPage\": 1, \"totalPages\": 1, \"totalRecord\": 1 }\n  }\n  ```\n  - 列表接口：`data` 为数组，`pageInfo` 返回分页信息（`pageSize`/`currentPage`/`totalPages`/`totalRecord`）。\n  - 单条/对象接口：`data` 为对象，无 `pageInfo`。\n  - **成功判定**：以 `code === 0` 为准；`message` 为提示文案（现有体系成功时可能为 `\"success\"` 或具体成功文案，仅作展示，不应用于逻辑分支）。\n- **字段命名**：小驼峰（camelCase），与现有 `goods*`、`shop*`、`batch*` 等保持一致。\n- **时间格式**：`yyyy-MM-dd HH:mm:ss`（字符串）；纯日期 `yyyy-MM-dd`。\n- **金额**：`decimal`（元，两位小数），JSON 数字（如 `3.99`）。\n\n---\n\n## 8. 复用现有接口（不重新定义字段）\n\n> 下列接口**已存在于现有 `/mnmart` 体系**，打印计划模块直接复用，字段以 YApi 导出定义为准，**不重新定义**。此处仅标注用途与本模块对应关系。\n\n| 接口 | 方法 | 本模块用途 | 关键入参 `data` | 关键返回 `data` |\n| --- | --- | --- | --- | --- |\n| `/mnmart/goods/list` | POST | 添加商品数据源（§4.4） | `keyword`/`status`/`enable`/`saleType`/`shopId`/`companyId`/`displayClassId` + `requestPage` | `goodsId`/`goodsName`/`goodsCode`/`goodsSpec`/`goodsUnitName`/`goodsListPrice`/`goodsPrice`/`vipPrice`/… |\n| `/mnmart/goods/detail` | POST | 商品详情（必要时） | `goodsId` | 商品完整字段 |\n| `/mnmart/goods/listGoodsPriceRecord` | POST | 改价日志数据源（§4.7） | `companyId`/`shopId`/`startTime`/`endTime`/`keyword` + `requestPage` | `goodsId`/`goodsName`/`goodsCode`/`goodsSpec`/`goodsUnitName`/`goodsListPrice`(原价)/`goodsPrice`(改前价)/`goodsAfterPrice`(改后价)/`operator`/`recordTime` |\n| `/mnmart/shop/list` | POST | 门店列表（§4.1 门店 Picker） | `keyword`/`status`/`companyId` + `requestPage` | `shopId`/`shopName`/`status`/`companyId`/… |\n| `/mnmart/dropdown` | POST | 企业&门店联动下拉（顶部筛选） | `type`(0企业&门店 1企业 2门店)/`companyId` | 树形 `id`/`name`/`status`/`children` |\n| `/mnmart/inventory/batchListByGoodsIdCode` | POST | 批次/生产日期（FIFO，§5.1） | `goodsCode`/`goodsIds[]` | `batchInventoryId`/`goodsId`/`goodsCode`/`batchNo`/`productionDate`/`expirationDate`/`shelfLifeType`/`shelfLife`/`inventory` |\n\n> 注：`/mnmart/code/*`（如 `code/printCode`/`code/list`/`code/loadCodeInfo`）属于**称重打码 / 秤端标签**能力，与本文的「价格标签打印」是不同功能，打印计划模块**不复用**该系列接口。\n\n---\n\n## 9. 新增打印计划接口\n\n> 仅打印计划领域特有的接口需新增，统一置于 `/mnmart/printPlan/*`（建议归入「商品管理」分组或独立分组）。所有接口遵守 §7 通用规范（POST + `{data, requestPage?}` + `{code, message, data, pageInfo?}`）。字段命名沿用现有体系（小驼峰）。\n\n### 9.1 通用说明\n- 所有写接口需在 `data` 中携带 `shopId`、`companyId`（与现有体系一致）。\n- 业务校验失败返回 `code ≠ 0` 并附 `message` 文案（见 §10）。\n\n### 9.2 计划列表 `POST /mnmart/printPlan/list`\n\n**请求 `data`**\n| 参数 | 类型 | 必填 | 说明 |\n| --- | --- | --- | --- |\n| `shopId` | string | 否 | 门店 ID，缺省=全部 |\n| `companyId` | string | 否 | 企业 ID |\n| `type` | int | 否 | `0` 手动 / `1` 调价，缺省=全部 |\n| `status` | int | 否 | `0` 待打印 / `1` 部分 / `2` 已完成，缺省=全部 |\n| `startTime` | string | 否 | 创建时间起始 `yyyy-MM-dd HH:mm:ss`，与 `endTime` 成对，缺省=全部（对应筛选栏「时间」Segment：今天/本周/本月由前端按当前日期算出后传入） |\n| `endTime` | string | 否 | 创建时间截止 `yyyy-MM-dd HH:mm:ss` |\n| `keyword` | string | 否 | 计划名称模糊匹配 |\n\n**响应 `data`**（数组，附 `pageInfo`）\n```json\n[\n  {\n    \"printPlanId\": \"pl_20260701_a1b2\",\n    \"planName\": \"崧泽大道中心店-调价-0701\",\n    \"shopId\": \"1810933789769904128\",\n    \"shopName\": \"崧泽大道中心店\",\n    \"companyId\": \"1810928032239439872\",\n    \"type\": 1,\n    \"status\": 1,\n    \"totalCount\": 2, \"pendingCount\": 1, \"printedCount\": 1,\n    \"createdAt\": \"2026-07-01 09:12:33\"\n  }\n]\n```\n\n### 9.3 新建计划 `POST /mnmart/printPlan/add`\n\n**请求 `data`**\n| 参数 | 类型 | 必填 | 说明 |\n| --- | --- | --- | --- |\n| `shopId` | string | 是 | 门店 ID |\n| `companyId` | string | 是 | 企业 ID |\n| `type` | int | 是 | `0` 手动 / `1` 调价 |\n| `planName` | string | 否 | 计划名称，缺省由服务端按\"门店+类型+日期\"生成 |\n\n**响应 `data`**：完整 `PrintPlan`（§6.5，含空 `items`）。\n\n### 9.4 计划详情 `POST /mnmart/printPlan/detail`\n\n**请求 `data`**：`{ \"printPlanId\": \"pl_20260701_a1b2\" }`\n**响应 `data`**：完整 `PrintPlan`（含 `items`，字段见 §6.6）。\n\n### 9.5 删除计划 `POST /mnmart/printPlan/delete`\n\n**请求 `data`**：`{ \"printPlanId\": \"pl_20260701_a1b2\" }`\n**业务说明**：**仅「待打印」（`status=0`）的计划允许删除**。若计划已存在打印记录（`status=1` 部分打印 / `status=2` 已完成），服务端拒绝删除并返回业务错误（见 §10 错误码，`code≠0` 并附 `message` 说明，如\"仅待打印计划可删除\"）；前端在列表操作列已对 `status≠0` 隐藏/禁用删除按钮作为前置校验。\n**响应 `data`**：`{ \"deleted\": true }`\n\n### 9.6 添加商品到计划 `POST /mnmart/printPlan/addGoods`\n\n**请求 `data`**\n```json\n{\n  \"printPlanId\": \"pl_20260701_a1b2\",\n  \"shopId\": \"1810933789769904128\",\n  \"companyId\": \"1810928032239439872\",\n  \"goodsList\": [ { \"goodsId\": \"1824610137569304576\", \"printQty\": 1 } ]\n}\n```\n**业务校验**：\n- `goodsId` 不存在 → `code ≠ 0`（提示\"商品无效\"）。\n- 商品已在计划：按 §5.3 处理（同价不重复、异价更新），非错误。\n\n**响应 `data`**：更新后的完整 `PrintPlan`。\n\n### 9.7 移除计划项 `POST /mnmart/printPlan/removeGoods`\n\n**请求 `data`**（二选一）\n```json\n{ \"printPlanId\": \"pl_20260701_a1b2\", \"itemIds\": [\"it_001\",\"it_002\"] }\n```\n或移除全部未打印：\n```json\n{ \"printPlanId\": \"pl_20260701_a1b2\", \"removeAllUnprinted\": true }\n```\n**响应 `data`**：更新后的完整 `PrintPlan`。\n\n### 9.8 打印记录通知（客户端打印完成后上报）`POST /mnmart/printPlan/print`\n\n> ⚠️ **本接口不做打印执行**：打印由客户端本地完成。本接口仅用于客户端在打印完成后**通知服务端记录**本次打印动作并回写计划项状态。\n\n**请求 `data`**\n```json\n{\n  \"printPlanId\": \"pl_20260701_a1b2\",\n  \"itemIds\": [\"it_001\",\"it_002\"],\n  \"templateId\": \"tpl-01\",\n  \"copies\": { \"it_001\": 2, \"it_002\": 1 }\n}\n```\n**业务说明**：服务端按 `itemIds` 记录本次打印动作（打印项、份数、模板、时间、操作人），回写各计划项 `printed=true`、`printedAt=now`；**不调用 `code/printCode`、不执行任何打印输出**。\n\n**响应 `data`**\n```json\n{ \"recordedItems\": [\"it_001\",\"it_002\"], \"totalLabels\": 3, \"printedAt\": \"2026-07-17 14:30:00\" }\n```\n\n### 9.9 调价自动入计划（服务端内部接口）`POST /mnmart/printPlan/autoAddFromPriceChange`\n\n> ⚠️ **调用方**：仅服务端在改价事件完成时调用，**前端不直接暴露、无用户入口**（对应 §4.6）。用户侧主动加入请使用 §9.10。\n\n**请求 `data`**\n```json\n{\n  \"shopId\": \"1810933789769904128\",\n  \"companyId\": \"1810928032239439872\",\n  \"goodsList\": [\n    { \"goodsId\": \"1824610137569304576\", \"goodsPrice\": 3.99, \"goodsListPrice\": 5.50, \"vipPrice\": 3.59 }\n  ]\n}\n```\n**业务规则**：执行 §5.3 调价归集逻辑（三层决策树：优选当天「调价自动」计划，次选当天未完成计划，否则新建「调价自动」计划；同商品比对价格，异价更新并视情况重置已打印）。\n\n**响应 `data`**\n```json\n{ \"planId\": \"pl_20260701_a1b2\", \"added\": 0, \"updated\": 1, \"resetPrinted\": 1 }\n```\n- `added`：新增商品数；`updated`：价格更新数；`resetPrinted`：已打印被重置为待打印数。\n\n### 9.10 从改价日志一键加入（用户侧）`POST /mnmart/printPlan/addFromPriceChanges` ~~已取消（v1.4）~~\n\n> ⚠️ **该接口已在 v1.4 取消**（对应 §4.7 用户主动操作已下架）。调价归集统一走 §9.9（服务端自动）或规则5 引擎（§5.5）。下方为历史契约，保留备查。数据源为 `POST /mnmart/goods/listGoodsPriceRecord`（§8）。\n\n**请求 `data`**\n```json\n{\n  \"target\": \"latest\",\n  \"shopId\": \"1810933789769904128\",\n  \"companyId\": \"1810928032239439872\",\n  \"goodsList\": [\n    { \"goodsId\": \"1824610137569304576\", \"goodsAfterPrice\": 3.99, \"goodsListPrice\": 5.50, \"vipPrice\": 3.59, \"recordTime\": \"2026-07-17 11:20:00\" }\n  ]\n}\n```\n**`target` 取值**：\n- `latest`：加入当天最新调价计划，无则自动新建（类型 `price-change`，`type=1`）。\n- `new`：新建当天调价计划再加入。\n- `{printPlanId}`：加入指定计划 ID。\n\n**业务规则**：执行 §5.3 调价归集逻辑（默认归属当天「调价自动」计划，或按 `target` 指定计划；同商品比对价格，异价更新并视情况重置已打印）。\n\n**响应 `data`**\n```json\n{ \"planId\": \"pl_20260701_a1b2\", \"added\": 0, \"updated\": 1, \"resetPrinted\": 1 }\n```\n\n---\n\n## 10. 错误码约定\n\n- 与现有 `/mnmart` 体系一致：**`code === 0` 成功**；`code ≠ 0` 为业务/系统错误，`message` 带回可读文案（前端直接提示 `message`）。\n- 具体业务码值（如计划不存在、商品已在计划、已打印不可改份数等）**以服务端定义为准**，前端按 `message` 提示，必要时刷新列表/详情。\n- 建议业务码分段（与现有风格对齐，非强制）：`1xxx` 参数类、`2xxx` 业务校验类、`5xxx` 服务端异常。示例：\n\n| code | 含义 | 处理建议 |\n| --- | --- | --- |\n| 0 | 成功 | — |\n| （业务码） | 计划不存在 | 提示并刷新列表 |\n| （业务码） | 商品/条码不存在 | 提示商品无效 |\n| （业务码） | 商品已在计划（手动场景） | 提示或自动定位 |\n| （业务码） | 已打印项不可改份数 | 禁用控件 |\n| （非 0） | 服务端异常 | 重试 / 上报 |\n\n---\n\n## 11. 非功能需求\n- **持久化**：生产环境数据持久化由服务端负责（见 §9），前端不本地落盘；演示态以 §6.9 的本地缓存为临时占位。\n- **统一与通用**：接口严格遵循 §7 通用规范（POST + 统一包体/响应 + 小驼峰 + JWT），并最大化复用 §8 现有接口，避免重复定义字段。\n- **层级**：打印预览弹窗层级高于计划详情弹窗，避免被遮挡。\n- **响应式**：弹窗窄屏按比例缩放（94vw 上限）。\n- **性能**：计划项 < 500 条时列表渲染 < 200ms（纯前端）。\n- **可观测**：关键操作（打印、删除）建议埋点统计。\n\n---\n\n## 12. 待确认 / 后续\n- 会员价是否需在计划详情展示（当前仅价签模板使用）。\n- 批量导入计划（Excel / 后台推送）待评估。\n- `printPlan/*` 接口分组归属（建议「商品管理」或独立分组），以服务端路由规划为准。\n- 已打印项价格变动时的处理（§5.3）：已明确规则（v1.4 消解）——价格相同则任何信息都不动（含打印状态，规则1）；价格不同则仅当目标计划为「调价自动」或「用户新增且未完成（按计划 `status`，非商品打印状态）」时才更新信息并重置待打印，用户新增且已完成的计划即便价格不同也保持原状。已在 index.html `ppAddPriceChangeProducts` 落实（含 `planUpdatable` 判定，规则5 统一入口）。\n\n## 13. 名词解释\n- **原价（`goodsListPrice`）**：商品吊牌/指导价，价签上以普通文本展示（非划线）。\n- **FIFO**：先进先出，此处指按批次生产日期（`productionDate`）取最早批次。\n- **二次打印**：已打印商品因调价/破损需重打，手动勾选后重新出签。\n- **调价自动入计划**：服务端在商品改价完成时**自动**归集到当天最新调价计划，**用户无操作**（见 §4.6 / §9.9）。\n- **改价日志一键加入**：⚠️ **已在 v1.4 取消**。原指用户在改价日志页主动加入打印计划（见 §4.7 / §9.10，均已标注取消）；现改价日志页仅保留「打印价签」原打印功能，调价归集改由服务端自动（§4.6）或规则5 引擎（§5.5）完成。\n- **调价自动计划**：由 §4.6 服务端自动归集、类型 `type=1` 的计划。\n";
function _ppEsc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
var _ppSections = {}; // 章节编号 -> 锚点 id
function _ppInline(s) {
  s = _ppEsc(s);
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // 自动把 §x.y 转成可点击跳转链接（仅当目标章节存在锚点时）
  s = s.replace(/§\s*(\d+(?:\.\d+)*)/g, function (m, num) {
    var id = _ppSections[num];
    if (!id) return m;
    return '<a class="xref" href="#' + id + '">' + m + '</a>';
  });
  return s;
}
function _ppMdToHtml(md) {
  var lines = md.replace(/\r\n/g, '\n').split('\n');
  var out = [];
  var i = 0;
  _ppSections = {};
  // 第一遍：先登记所有章节锚点，保证前向引用也能正确跳转
  lines.forEach(function (l) {
    var mh = l.match(/^#{1,6}\s+(\d+(?:\.\d+)*)\.?\s+/);
    if (mh) { _ppSections[mh[1]] = 'sec-' + mh[1].replace(/\./g, '-'); }
  });
  var listStack = [];
  function closeLists(toIndent) {
    while (listStack.length && listStack[listStack.length - 1].indent >= toIndent) {
      out.push('</' + listStack.pop().type + '>');
    }
  }
  while (i < lines.length) {
    var line = lines[i];
    if (/^```/.test(line)) {
      var buf = [];
      i++;
      while (i < lines.length && !/^```/.test(lines[i])) { buf.push(lines[i]); i++; }
      i++;
      out.push('<pre><code>' + _ppEsc(buf.join('\n')) + '</code></pre>');
      continue;
    }
    var h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h) {
      var lv = h[1].length;
      var content = h[2];
      var idAttr = '';
      // 提取标题中的章节编号（如 "9.6 添加商品到计划" -> num="9.6"）
      var numMatch = content.match(/^(\d+(?:\.\d+)*)\.?\s+(.*)$/);
      if (numMatch) {
        var num = numMatch[1];
        var id = 'sec-' + num.replace(/\./g, '-');
        _ppSections[num] = id;
        idAttr = ' id="' + id + '"';
      }
      out.push('<h' + lv + idAttr + '>' + _ppInline(content) + '</h' + lv + '>');
      i++; continue;
    }
    if (/^---+\s*$/.test(line)) { out.push('<hr/>'); i++; continue; }
    if (/^>\s?/.test(line)) {
      var qbuf = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) { qbuf.push(_ppInline(lines[i].replace(/^>\s?/, ''))); i++; }
      out.push('<blockquote>' + qbuf.join('<br/>') + '</blockquote>');
      continue;
    }
    if (/^\|.*\|\s*$/.test(line) && i + 1 < lines.length && /^\|[\s:|-]+\|\s*$/.test(lines[i + 1])) {
      var thead = line;
      i += 2;
      var rows = [];
      while (i < lines.length && /^\|.*\|\s*$/.test(lines[i])) { rows.push(lines[i]); i++; }
      function cells(r) { return r.replace(/^\|/, '').replace(/\|$/, '').split('|').map(function (c) { return c.trim(); }); }
      var th = cells(thead);
      var tbl = '<div class="table-wrap"><table><thead><tr>' + th.map(function (c) { return '<th>' + _ppInline(c) + '</th>'; }).join('') + '</tr></thead><tbody>';
      rows.forEach(function (r) {
        var td = cells(r);
        tbl += '<tr>' + td.map(function (c) { return '<td>' + _ppInline(c) + '</td>'; }).join('') + '</tr>';
      });
      tbl += '</tbody></table></div>';
      out.push(tbl);
      continue;
    }
    var lm = line.match(/^(\s*)([-*]|\d+\.)\s+(.*)$/);
    if (lm) {
      var indent = lm[1].length;
      var isOl = /\d+\./.test(lm[2]);
      var type = isOl ? 'ol' : 'ul';
      closeLists(indent + 1);
      if (!listStack.length || listStack[listStack.length - 1].indent < indent || listStack[listStack.length - 1].type !== type) {
        if (listStack.length && listStack[listStack.length - 1].indent === indent && listStack[listStack.length - 1].type === type) {
        } else {
          closeLists(indent);
          if (!listStack.length || listStack[listStack.length - 1].indent !== indent || listStack[listStack.length - 1].type !== type) {
            out.push('<' + type + '>');
            listStack.push({ type: type, indent: indent });
          }
        }
      }
      out.push('<li>' + _ppInline(lm[3]) + '</li>');
      i++;
      continue;
    }
    closeLists(0);
    if (/^\s*$/.test(line)) { i++; continue; }
    out.push('<p>' + _ppInline(line) + '</p>');
    i++;
  }
  closeLists(0);
  return out.join('\n');
}

document.getElementById("doc").innerHTML = _ppMdToHtml(MD);
</script>
